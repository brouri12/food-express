version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: foodexpress-mysql
    environment:
      MYSQL_ROOT_PASSWORD: MySecurePassword@123
      MYSQL_DATABASE: foodexpress_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - foodexpress-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Keycloak commented out - using local Windows installation at C:\keycloak
  # Start Keycloak manually: C:\keycloak\bin\kc.bat start-dev
  # It will run on http://localhost:9090

  eureka-server:
    image: foodexpress/eureka-server:latest
    container_name: foodexpress-eureka
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - foodexpress-network
    depends_on:
      - mysql

  api-gateway:
    image: foodexpress/api-gateway:latest
    container_name: foodexpress-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/foodexpress
    networks:
      - foodexpress-network
    depends_on:
      - eureka-server

  user-service:
    image: foodexpress/user-service:latest
    container_name: foodexpress-user-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySecurePassword@123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/foodexpress
    networks:
      - foodexpress-network
    depends_on:
      - mysql
      - eureka-server

  delivery-service:
    image: foodexpress/delivery-service:latest
    container_name: foodexpress-delivery-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySecurePassword@123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:9090/realms/foodexpress
    networks:
      - foodexpress-network
    depends_on:
      - mysql
      - eureka-server

  promotion-service:
    image: foodexpress/promotion-service:latest
    container_name: foodexpress-promotion-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/promotion_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySecurePassword@123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - foodexpress-network
    depends_on:
      - mysql
      - eureka-server

  restaurant-service:
    image: foodexpress/restaurant-service:latest
    container_name: foodexpress-restaurant-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/restaurant_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySecurePassword@123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - foodexpress-network
    depends_on:
      - mysql
      - eureka-server

  menu-service:
    image: foodexpress/menu-service:latest
    container_name: foodexpress-menu-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/menu_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: MySecurePassword@123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - foodexpress-network
    depends_on:
      - mysql
      - eureka-server

volumes:
  mysql_data:
    driver: local

networks:
  foodexpress-network:
    driver: bridge

# IMPORTANT NOTES:
# 1. This docker-compose file assumes you have Keycloak running locally on Windows at C:\keycloak
# 2. Start Keycloak before starting Docker containers: C:\keycloak\bin\kc.bat start-dev
# 3. Keycloak will be accessible at: http://localhost:9090
# 4. Services connect to Keycloak via host.docker.internal:9090 (Docker's bridge to host)
# 5. Make sure to import keycloak-realm.json in Keycloak admin console
#
# Usage:
# docker-compose up -d    # Start all services
# docker-compose down     # Stop all services
# docker-compose logs -f  # View logs in real-time

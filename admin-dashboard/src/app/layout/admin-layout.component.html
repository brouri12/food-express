<div class="flex h-screen bg-gray-100 overflow-hidden">
  <!-- Sidebar -->
  <aside [class]="sidebarOpen ? 'w-64' : 'w-16'"
    class="bg-white shadow-lg flex flex-col transition-all duration-300 flex-shrink-0">
    <!-- Logo -->
    <div class="h-16 flex items-center px-4 border-b border-gray-100">
      <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center flex-shrink-0">
        <span class="text-white text-xl">🍽️</span>
      </div>
      <span *ngIf="sidebarOpen" class="ml-3 text-lg font-bold bg-gradient-to-r from-orange-600 to-red-600 bg-clip-text text-transparent">
        Admin Panel
      </span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 py-4 space-y-1 px-2">
      <a *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="bg-orange-50 text-orange-600 font-semibold"
        class="flex items-center gap-3 px-3 py-3 rounded-lg text-gray-600 hover:bg-orange-50 hover:text-orange-600 transition-colors cursor-pointer">
        <span class="text-xl flex-shrink-0">{{ item.icon }}</span>
        <span *ngIf="sidebarOpen" class="text-sm">{{ item.label }}</span>
      </a>
    </nav>

    <!-- Toggle -->
    <div class="p-4 border-t border-gray-100">
      <button (click)="sidebarOpen = !sidebarOpen"
        class="w-full flex items-center justify-center p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
        <span>{{ sidebarOpen ? '◀' : '▶' }}</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 flex-shrink-0">
      <h1 class="text-lg font-semibold text-gray-800">FoodExpress — Administration</h1>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">Admin</span>
        <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-red-500 rounded-full flex items-center justify-center">
          <span class="text-white text-sm font-bold">A</span>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>
  </div>
</div>

<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Livraisons 🛵</h1>
      <p class="text-gray-500 text-sm mt-1">Gérer toutes les livraisons</p>
    </div>
    <button (click)="load()" class="btn-outline">🔄 Actualiser</button>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl shadow-sm p-4 flex flex-col sm:flex-row gap-3">
    <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="applyFilter()"
      placeholder="Rechercher par commande ou adresse..."
      class="flex-1 border border-gray-200 rounded-lg px-4 py-2 outline-none focus:border-orange-400 text-sm" />
    <select [(ngModel)]="filterStatus" (ngModelChange)="applyFilter()"
      class="border border-gray-200 rounded-lg px-4 py-2 outline-none focus:border-orange-400 text-sm">
      <option value="">Tous les statuts</option>
      <option *ngFor="let s of statuses" [value]="s">{{ statusLabel(s) }}</option>
    </select>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center h-32">
    <div class="animate-spin rounded-full h-10 w-10 border-4 border-orange-500 border-t-transparent"></div>
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Commande</th>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Adresse</th>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Livreur</th>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Statut</th>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Date</th>
          <th class="text-left px-4 py-3 font-semibold text-gray-600">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of filtered" class="table-row">
          <td class="px-4 py-3 font-mono font-semibold text-gray-900">{{ d.orderId }}</td>
          <td class="px-4 py-3 text-gray-600 max-w-xs truncate">{{ d.deliveryAddress }}</td>
          <td class="px-4 py-3 text-gray-600">{{ d.driverName ?? '—' }}</td>
          <td class="px-4 py-3">
            <span [class]="statusBadge(d.status)">{{ statusLabel(d.status) }}</span>
          </td>
          <td class="px-4 py-3 text-gray-500">{{ d.createdAt | date:'dd/MM HH:mm' }}</td>
          <td class="px-4 py-3">
            <div class="flex items-center gap-2">
              <select (change)="updateStatus(d, $any($event.target).value)"
                class="text-xs border border-gray-200 rounded px-2 py-1 outline-none">
                <option value="">Changer statut</option>
                <option *ngFor="let s of statuses" [value]="s">{{ statusLabel(s) }}</option>
              </select>
              <button (click)="delete(d.id)" class="text-red-500 hover:text-red-700 text-xs font-semibold">
                Suppr.
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td colspan="6" class="px-4 py-8 text-center text-gray-400">Aucune livraison trouvée</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

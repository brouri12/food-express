<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo -->
        <a routerLink="/" class="flex items-center gap-2">
          <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-500 rounded-lg flex items-center justify-center">
            <span class="text-white text-xl font-bold">🍽️</span>
          </div>
          <span class="text-xl font-bold bg-gradient-to-r from-orange-600 to-red-600 bg-clip-text text-transparent">
            FoodExpress
          </span>
        </a>

        <!-- Nav Desktop -->
        <nav class="hidden md:flex items-center gap-6">
          <a routerLink="/" routerLinkActive="text-orange-600 bg-orange-50"
             [routerLinkActiveOptions]="{exact: true}"
             class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors text-gray-600 hover:text-orange-600 hover:bg-orange-50">
            🏠 Accueil
          </a>
          <a routerLink="/restaurants" routerLinkActive="text-orange-600 bg-orange-50"
             class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors text-gray-600 hover:text-orange-600 hover:bg-orange-50">
            🍴 Restaurants
          </a>
          <a routerLink="/promotions" routerLinkActive="text-orange-600 bg-orange-50"
             class="flex items-center gap-2 px-3 py-2 rounded-lg transition-colors text-gray-600 hover:text-orange-600 hover:bg-orange-50">
            🎁 Promotions
          </a>
        </nav>

        <!-- Actions -->
        <div class="flex items-center gap-3">
          <a routerLink="/cart" class="relative p-2 text-gray-600 hover:text-orange-600 transition-colors">
            🛒
            <span *ngIf="cartCount > 0"
              class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">
              {{ cartCount }}
            </span>
          </a>
          <a routerLink="/profile"
             class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:from-orange-600 hover:to-red-600 transition-all text-sm">
            Mon compte
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main>
    <router-outlet />
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50">
    <div class="grid grid-cols-4 h-16">
      <a routerLink="/" routerLinkActive="text-orange-600" [routerLinkActiveOptions]="{exact: true}"
         class="flex flex-col items-center justify-center gap-1 text-gray-500 text-xs">
        <span class="text-xl">🏠</span> Accueil
      </a>
      <a routerLink="/restaurants" routerLinkActive="text-orange-600"
         class="flex flex-col items-center justify-center gap-1 text-gray-500 text-xs">
        <span class="text-xl">🍴</span> Restaurants
      </a>
      <a routerLink="/cart" routerLinkActive="text-orange-600"
         class="flex flex-col items-center justify-center gap-1 text-gray-500 text-xs relative">
        <span class="text-xl">🛒</span> Panier
      </a>
      <a routerLink="/profile" routerLinkActive="text-orange-600"
         class="flex flex-col items-center justify-center gap-1 text-gray-500 text-xs">
        <span class="text-xl">👤</span> Profil
      </a>
    </div>
  </nav>
</div>

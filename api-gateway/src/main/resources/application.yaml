spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: rating-service
          uri: lb://rating-service
          predicates:
            - Path=/ratings/**
        - id: rating-api
          uri: lb://rating-service
          predicates:
            - Path=/api/ratings/**
          filters:
            - RewritePath=/api/ratings/(?<remaining>.*), /$\{remaining}

server:
  port: 8222

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
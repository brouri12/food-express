spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # ── Rating Service ──
        - id: rating-service
          uri: lb://rating-service
          predicates:
            - Path=/ratings/**

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/foodexpress
          jwk-set-uri: http://localhost:8080/realms/foodexpress/protocol/openid-connect/certs

server:
  port: 8222

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
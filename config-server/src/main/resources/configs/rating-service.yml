server:
  port: 8087

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rating_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password:        # laisser vide — root XAMPP n'a pas de mot de passe
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/foodexpress
          jwk-set-uri: http://localhost:9090/realms/foodexpress/protocol/openid-connect/certs

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      restaurant-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

springdoc:
  swagger-ui:
    enabled: true
    try-it-out-enabled: true
# Application
spring.application.name=UserService
server.port=8081

# Eureka Discovery
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/userservice_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Keycloak
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:9090}
keycloak.realm=wordly-realm
keycloak.resource=user-service-client
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET:change-me-in-production}

# OAuth2 Resource Server (JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:9090}/realms/wordly-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:9090}/realms/wordly-realm/protocol/openid-connect/certs

# Stripe
stripe.api.key=${STRIPE_API_KEY:change-me-in-production}
